<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>貓小隊靶紙辨識 · A 攝影端（ArUco 自動校正）</title>
<!-- js-aruco2：cv.js 必須在 aruco.js 之前，兩者掛上 window.CV / window.AR -->
<script src="https://cdn.jsdelivr.net/npm/js-aruco2@2.0.0/src/cv.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-aruco2@2.0.0/src/aruco.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #0e1116; color: #e7ecf3;
         font-family: -apple-system, "Noto Sans TC", system-ui, sans-serif;
         padding: 12px; max-width: 560px; margin-inline: auto; }
  h1 { font-size: 16px; margin: 4px 0 10px; }
  h1 small { color: #6f7b8c; font-weight: 400; }
  .stage { position: relative; width: 100%; aspect-ratio: 4/3; background: #000;
           border-radius: 10px; overflow: hidden; border: 1px solid #232b36; }
  canvas#view { width: 100%; height: 100%; display: block; }
  .status { display: flex; align-items: center; gap: 8px; margin: 10px 0;
            font-size: 13px; color: #aab4c2; min-height: 20px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #46506180; flex: none; }
  .dot.on { background: #34d399; box-shadow: 0 0 8px #34d39988; }
  .room { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  input { background: #161c25; border: 1px solid #2a3340; color: #e7ecf3;
          border-radius: 8px; padding: 10px 12px; font-size: 15px; width: 96px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  button { flex: 1 1 auto; min-width: 110px; border: 0; border-radius: 9px;
           padding: 13px 12px; font-size: 15px; font-weight: 600; color: #0e1116;
           background: #5b8cff; }
  button.ghost { background: #1b2330; color: #cfd8e4; border: 1px solid #2c3744; }
  button:disabled { opacity: .4; }
  .score { font-size: 13px; color: #9aa6b6; margin-top: 6px; min-height: 18px; }
  .score b { color: #ffd166; font-size: 22px; }
  .hint { font-size: 12px; color: #6f7b8c; line-height: 1.5; margin-top: 10px; }
</style>
</head>
<body>
  <h1>貓小隊靶紙辨識 <small>· A 攝影端 · ArUco 自動校正</small></h1>

  <div class="room">
    <span style="font-size:13px;color:#aab4c2">房號</span>
    <input id="room" value="888" inputmode="numeric" />
    <button id="btnConnect" style="flex:1">連線</button>
  </div>

  <div class="stage"><canvas id="view" width="480" height="360"></canvas></div>
  <div class="status"><span id="dot" class="dot"></span><span id="msg">尚未連線</span></div>

  <div class="row" style="margin-bottom:8px">
    <button id="btnCalib" class="ghost" disabled>自動校正四角</button>
    <button id="btnRing" class="ghost" disabled>校準靶環</button>
    <button id="btnBg" class="ghost" disabled>設定背景</button>
  </div>
  <div class="row">
    <button id="btnArm" disabled>開始偵測</button>
    <button id="btnNext" class="ghost" disabled>下一箭</button>
  </div>

  <div class="score" id="scoreLine"></div>

  <p class="hint">
    先把四張 ArUco 標記（id 0/1/2/3 → 左上/右上/右下/左下）貼在靶角。
    流程：① 連線 → ② 按「自動校正四角」對準靶面，四角全進畫面即自動鎖定 →
    ③ 靶面乾淨時「設定背景」→ ④「開始偵測」→ 放箭。需 https 或 localhost。
  </p>

  <video id="cam" autoplay playsinline muted style="display:none"></video>

<script type="module">
import { applyHomography } from "./lib/homography.js";
import { ArrowDetector } from "./lib/detector.js";
import { scoreFromNormalized, pickEntryPoint, setTargetGeometry } from "./lib/scoring.js";
import { MarkerCalibrator } from "./lib/markers.js";

const W = 480, VH = 360;
const cam = document.getElementById("cam");
const view = document.getElementById("view");
const ctx = view.getContext("2d", { willReadFrequently: true });
const el = (id) => document.getElementById(id);
const dot = el("dot"), msg = el("msg"), scoreLine = el("scoreLine");

let state = "idle";          // idle → ready → calibrating → calibrated → armed → result
let H = null, srcPts = null;
const detector = new ArrowDetector();
let calibrator = null;
let conn = null;
let lastDetect = 0, lastCalib = 0;

function setMsg(t, on) { msg.textContent = t; dot.classList.toggle("on", !!on); }

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false,
    });
    cam.srcObject = stream; await cam.play(); loop();
  } catch (e) { setMsg("無法開啟鏡頭：" + e.message, false); }
}

function connect() {
  const room = el("room").value.trim() || "888";
  const peer = new Peer("catarch-cam-" + room);
  peer.on("open", () => {
    setMsg("已上線，房號 " + room, true);
    state = "ready";
    el("btnCalib").disabled = false; el("btnBg").disabled = false;
    try { calibrator = new MarkerCalibrator(); }
    catch (e) { setMsg("ArUco 載入失敗：" + e.message, false); }
    startCamera();
  });
  peer.on("connection", (c) => {
    conn = c;
    c.on("open", () => setMsg("B 端已連線 ✓", true));
    c.on("close", () => setMsg("B 端已離線", false));
  });
  peer.on("error", (e) => setMsg("連線錯誤：" + e.type, false));
  el("btnConnect").disabled = true;
}

el("btnConnect").onclick = connect;

// ---- 校準靶環：依序點 靶心 → 右緣 → 上緣，算出 (cx,cy,rx,ry) 並同步給 B ----
let ringStep = -1;            // -1 關閉；0 等靶心；1 等右緣；2 等上緣
let ringCenter = null, ringRx = 0;
el("btnRing").onclick = () => {
  if (!H) { setMsg("請先完成自動校正", false); return; }
  ringStep = 0;
  setMsg("校準靶環：請點【靶心 +】", false);
};
view.addEventListener("pointerdown", (ev) => {
  if (ringStep < 0 || !H) return;
  const r = view.getBoundingClientRect();
  const vx = (ev.clientX - r.left) * (W / r.width);
  const vy = (ev.clientY - r.top) * (VH / r.height);
  const n = applyHomography(H, vx, vy); // 換成校正後正規化座標
  if (ringStep === 0) {
    ringCenter = n; ringStep = 1; setMsg("再點【最外環的右緣】", false);
  } else if (ringStep === 1) {
    ringRx = Math.abs(n.x - ringCenter.x); ringStep = 2;
    setMsg("最後點【最外環的上緣】", false);
  } else if (ringStep === 2) {
    const ry = Math.abs(n.y - ringCenter.y);
    const g = { cx: ringCenter.x, cy: ringCenter.y, rx: ringRx, ry };
    setTargetGeometry(g);
    if (conn && conn.open) conn.send({ type: "geo", g });
    ringStep = -1;
    setMsg(`靶環校準完成 ✓ cx${g.cx.toFixed(2)} cy${g.cy.toFixed(2)} rx${g.rx.toFixed(2)} ry${g.ry.toFixed(2)}`, true);
    console.log("貼進 scoring.js 的 targetGeometry：", JSON.stringify(g));
  }
});

el("btnCalib").onclick = () => {
  if (!calibrator) { setMsg("ArUco 尚未就緒", false); return; }
  state = "calibrating"; H = null; srcPts = null;
  el("btnCalib").textContent = "重新校正";
  setMsg("校正中：請讓四角標記都進入畫面…", false);
};

el("btnBg").onclick = () => {
  if (!H) { setMsg("請先完成自動校正", false); return; }
  detector.setReference(ctx.getImageData(0, 0, W, VH));
  setMsg("背景已記錄，可開始偵測", true);
  el("btnArm").disabled = false;
};

el("btnArm").onclick = () => {
  if (!H || !detector.hasReference()) { setMsg("請先校正並設定背景", false); return; }
  state = "armed"; el("btnArm").disabled = true; el("btnNext").disabled = false;
  setMsg("偵測中…放箭", true);
};

el("btnNext").onclick = () => {
  detector.setReference(ctx.getImageData(0, 0, W, VH));
  state = "armed"; scoreLine.textContent = "";
  setMsg("偵測中…放下一箭", true); loop();
};

function loop() {
  if (state === "result") return;
  ctx.drawImage(cam, 0, 0, W, VH);

  // 自動校正（節流）
  if (state === "calibrating" && performance.now() - lastCalib > 300) {
    lastCalib = performance.now();
    const r = calibrator.calibrate(ctx.getImageData(0, 0, W, VH));
    if (r.ok) {
      H = r.H; srcPts = r.src; state = "calibrated";
      el("btnRing").disabled = false;
      setMsg("校正鎖定 ✓ 可設定背景；或先「校準靶環」更準", true);
    } else {
      setMsg(`校正中…已看到標記 [${r.found.join(", ") || "無"}]（需 0,1,2,3）`, false);
    }
  }

  // 鎖定後畫出四角框
  if (srcPts) {
    ctx.strokeStyle = "#34d399cc"; ctx.lineWidth = 2; ctx.beginPath();
    srcPts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.closePath(); ctx.stroke();
  }

  // 箭矢偵測（節流）
  if (state === "armed" && performance.now() - lastDetect > 150) {
    lastDetect = performance.now();
    const res = detector.detect(ctx.getImageData(0, 0, W, VH));
    if (res) handleHit(res);
  }

  requestAnimationFrame(loop);
}

function handleHit(res) {
  const [a, b] = res.ends;
  const na = applyHomography(H, a.x, a.y);
  const nb = applyHomography(H, b.x, b.y);
  const entryNorm = pickEntryPoint(na, nb);
  const entryPx = (entryNorm === na) ? a : b;
  const sc = scoreFromNormalized(entryNorm.x, entryNorm.y);

  ctx.strokeStyle = "#5b8cff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  ctx.fillStyle = "#ffd166";
  ctx.beginPath(); ctx.arc(entryPx.x, entryPx.y, 8, 0, 7); ctx.fill();

  scoreLine.innerHTML = `辨識：<b>${sc.ring === "M" ? "脫靶" : sc.score}</b> 分　(${entryNorm.x.toFixed(2)}, ${entryNorm.y.toFixed(2)})`;
  setMsg("已辨識並傳給 B，按「下一箭」繼續", true);
  state = "result";
  if (conn && conn.open)
    conn.send({ nx: entryNorm.x, ny: entryNorm.y, score: sc.score, ring: sc.ring, ts: Date.now() });
}
</script>
</body>
</html>
