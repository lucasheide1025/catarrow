<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>貓小隊靶紙辨識 · B 射手端</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #0e1116; color: #e7ecf3;
         font-family: -apple-system, "Noto Sans TC", system-ui, sans-serif;
         padding: 12px; max-width: 480px; margin-inline: auto; }
  h1 { font-size: 16px; margin: 4px 0 10px; }
  h1 small { color: #6f7b8c; font-weight: 400; }
  .room { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  input { background: #161c25; border: 1px solid #2a3340; color: #e7ecf3;
          border-radius: 8px; padding: 10px 12px; font-size: 15px; width: 96px; }
  button { border: 0; border-radius: 9px; padding: 12px 14px; font-size: 15px;
           font-weight: 600; color: #0e1116; background: #5b8cff; }
  button.ghost { background: #1b2330; color: #cfd8e4; border: 1px solid #2c3744; }
  button:disabled { opacity: .4; }
  .status { font-size: 13px; color: #aab4c2; margin: 8px 0; min-height: 18px; }
  .target-wrap { display: flex; justify-content: center; }
  canvas { touch-action: none; border-radius: 12px; background: #11161e;
           border: 1px solid #232b36; }
  .now { text-align: center; margin: 10px 0; }
  .now .big { font-size: 40px; font-weight: 800; color: #ffd166; line-height: 1; }
  .now .lbl { font-size: 12px; color: #6f7b8c; }
  .actions { display: flex; gap: 8px; margin: 10px 0; }
  .actions button { flex: 1; }
  .session { margin-top: 12px; }
  .session h2 { font-size: 13px; color: #9aa6b6; margin: 0 0 6px; font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: #161c25; border: 1px solid #2a3340; border-radius: 20px;
          padding: 4px 11px; font-size: 14px; }
  .total { font-size: 13px; color: #aab4c2; margin: 8px 0; }
  .total b { color: #e7ecf3; font-size: 18px; }
  .hint { font-size: 12px; color: #6f7b8c; line-height: 1.5; margin-top: 10px; }
  @keyframes dmgFloat {
    0%   { opacity:1; transform: translateY(0) scale(1); }
    80%  { opacity:1; transform: translateY(-60px) scale(1.15); }
    100% { opacity:0; transform: translateY(-80px) scale(0.9); }
  }
  .dmg-float { position:fixed; pointer-events:none; font-weight:900; font-size:2.4rem;
               animation: dmgFloat 1.1s ease forwards; z-index:999; }
</style>
</head>
<body>
  <h1>貓小隊靶紙辨識 <small>· B 射手端</small></h1>

  <div class="room">
    <span style="font-size:13px;color:#aab4c2">房號</span>
    <input id="room" value="888" inputmode="numeric" />
    <button id="btnConnect">連線到 A</button>
  </div>

  <div class="status" id="status">尚未連線</div>

  <div class="target-wrap"><canvas id="target" width="320" height="320"></canvas></div>

  <div class="now">
    <div class="big" id="nowScore">—</div>
    <div class="lbl">本箭分數（可拖曳上方圓點微調）</div>
  </div>

  <div class="actions">
    <button id="btnConfirm" disabled>✔ 確認送出本箭</button>
  </div>

  <div class="session">
    <h2>本組暫存（尚未寫入資料庫）</h2>
    <div class="chips" id="chips"></div>
    <div class="total" id="total">尚無紀錄</div>
    <button id="btnSettle" class="ghost" style="width:100%" disabled>結算這一組（送出唯一一次寫入）</button>
  </div>

  <p class="hint">
    A 端辨識後落點會自動出現在這裡。AI 抓個八九成，零頭由你拖一下修掉，確認才算數。<br />
    每箭只存在記憶體；按「結算」才會把整組一次寫入資料庫——這就是省讀寫配額的關鍵。
  </p>

<script>
  // Firebase 初始化（API key 為前端公開值，受 Firestore 規則保護）
  window.fbApp = firebase.initializeApp({
    apiKey: "AIzaSyAFCQeV757IXl4_UgN47Gr3Q_xSwJb2Asw",
    authDomain: "catgroup-8d0bb.firebaseapp.com",
    projectId: "catgroup-8d0bb",
  });
  window.fbDb = firebase.firestore(window.fbApp);
  // 從 URL 取 memberId（由教練後台開啟時帶入）
  window.urlMemberId = new URLSearchParams(location.search).get("memberId") || "";
</script>

<script type="module">
import { scoreFromNormalized, setTargetGeometry, targetGeometry } from "./lib/scoring.js";

const S = 320, mid = S / 2, visR = S / 2 - 16; // 顯示用：把橢圓靶面畫成乾淨圓形
const cv = document.getElementById("target");
const ctx = cv.getContext("2d");
const el = (id) => document.getElementById(id);

let current = null;     // { nx, ny }
let session = [];       // 暫存的每一箭（記憶體，未進 DB）
let dragging = false;

// 正規化(橢圓空間) ↔ 螢幕像素。用各軸 scale 把橢圓還原成視覺上的圓。
function norm2px(nx, ny) {
  const g = targetGeometry;
  return { px: mid + (nx - g.cx) / g.rx * visR, py: mid + (ny - g.cy) / g.ry * visR };
}
function px2norm(px, py) {
  const g = targetGeometry;
  return { nx: g.cx + (px - mid) / visR * g.rx, ny: g.cy + (py - mid) / visR * g.ry };
}

function drawTarget() {
  ctx.clearRect(0, 0, S, S);
  // 5 環 6~10（顯示為同心圓）
  for (let i = 5; i >= 1; i--) {
    const r = (i / 5) * visR;
    ctx.beginPath(); ctx.arc(mid, mid, r, 0, 7);
    ctx.fillStyle = i % 2 ? "#1a2230" : "#141b26"; ctx.fill();
    ctx.strokeStyle = "#2c3744"; ctx.lineWidth = 1; ctx.stroke();
  }
  // 十字
  ctx.strokeStyle = "#2c3744";
  ctx.beginPath(); ctx.moveTo(mid - visR, mid); ctx.lineTo(mid + visR, mid);
  ctx.moveTo(mid, mid - visR); ctx.lineTo(mid, mid + visR); ctx.stroke();

  if (current) {
    const { px, py } = norm2px(current.nx, current.ny);
    ctx.fillStyle = "#ffd166";
    ctx.beginPath(); ctx.arc(px, py, 9, 0, 7); ctx.fill();
    ctx.strokeStyle = "#0e1116"; ctx.lineWidth = 2; ctx.stroke();
  }
}

function refreshScore() {
  if (!current) { el("nowScore").textContent = "—"; return; }
  const sc = scoreFromNormalized(current.nx, current.ny);
  current.score = sc.score; current.ring = sc.ring;
  el("nowScore").textContent = sc.ring === "M" ? "脫靶" : sc.score;
}

// 拖曳微調
function pos(ev) {
  const r = cv.getBoundingClientRect();
  return { x: (ev.clientX - r.left) * (S / r.width), y: (ev.clientY - r.top) * (S / r.height) };
}
cv.addEventListener("pointerdown", (ev) => { if (current) { dragging = true; move(ev); } });
cv.addEventListener("pointermove", (ev) => { if (dragging) move(ev); });
cv.addEventListener("pointerup", () => dragging = false);
cv.addEventListener("pointercancel", () => dragging = false);
function move(ev) {
  const { x, y } = pos(ev);
  current = { ...current, ...px2norm(x, y) };
  refreshScore(); drawTarget();
}

// RPG 傷害動畫
function showDmg(score) {
  const isCrit = score === 10;
  const isMiss = score === 0;
  const label  = isMiss ? "MISS" : isCrit ? `⚡ ${score * 10}!` : `${score * 10}`;
  const color  = isMiss ? "#6f7b8c" : isCrit ? "#ffd166" : "#ef4444";
  const el2 = document.createElement("div");
  el2.className = "dmg-float";
  el2.textContent = label;
  el2.style.cssText = `color:${color};left:${30 + Math.random()*40}vw;top:50vh;text-shadow:0 0 12px ${color}`;
  document.body.appendChild(el2);
  setTimeout(() => el2.remove(), 1200);
}

// 確認 → 進暫存
el("btnConfirm").onclick = () => {
  if (!current) return;
  showDmg(current.score);
  session.push({ nx: current.nx, ny: current.ny, score: current.score, ts: Date.now() });
  current = null;
  el("btnConfirm").disabled = true;
  el("nowScore").textContent = "—";
  renderSession(); drawTarget();
  el("status").textContent = "已確認，等待下一箭…";
};

function renderSession() {
  el("chips").innerHTML = session
    .map((a, i) => `<span class="chip">${i + 1}. ${a.score === 0 ? "M" : a.score}</span>`).join("");
  const total = session.reduce((s, a) => s + a.score, 0);
  el("total").innerHTML = session.length
    ? `共 ${session.length} 箭　總分 <b>${total}</b>`
    : "尚無紀錄";
  el("btnSettle").disabled = session.length === 0;
}

// 結算 → 寫入 Firestore practiceLogs（整組唯一一次）
el("btnSettle").onclick = async () => {
  const total = session.reduce((s, a) => s + a.score, 0);
  const payload = {
    sessionId: "arc-" + Date.now(),
    arrows: session,
    total,
    count: session.length,
  };
  el("btnSettle").disabled = true;
  el("status").textContent = "寫入中…";
  try {
    if (window.urlMemberId) {
      await window.fbDb.collection("practiceLogs").add({
        memberId:  window.urlMemberId,
        type:      "archery_ai",
        mode:      "archery",
        device:    "ai-cam",
        arrows:    session.map(a => ({ score: a.score, nx: a.nx, ny: a.ny })),
        total,
        arrowCount: session.length,
        at:        firebase.firestore.FieldValue.serverTimestamp(),
        sessionId: payload.sessionId,
      });
      el("status").textContent = `✅ 已結算：${payload.count} 箭、總分 ${total}，已寫入資料庫`;
    } else {
      console.log("[結算 payload]", payload);
      el("status").textContent = `已結算（無 memberId）：${payload.count} 箭、總分 ${total}`;
    }
  } catch(e) {
    el("status").textContent = "❌ 寫入失敗：" + e.message;
    el("btnSettle").disabled = false;
    return;
  }
  session = []; renderSession(); drawTarget();
};

// 連線到 A
el("btnConnect").onclick = () => {
  const room = el("room").value.trim() || "888";
  const peer = new Peer();
  peer.on("open", () => {
    el("status").textContent = "連線中…";
    const c = peer.connect("catarch-cam-" + room);
    c.on("open", () => el("status").textContent = "已連線到 A ✓ 房號 " + room);
    c.on("data", (d) => {
      if (d && d.type === "geo") {       // A 端校準靶環後同步幾何，確保兩端一致
        setTargetGeometry(d.g); drawTarget();
        el("status").textContent = "已同步靶環校準";
        return;
      }
      current = { nx: d.nx, ny: d.ny };
      refreshScore(); drawTarget();
      el("btnConfirm").disabled = false;
      el("status").textContent = "A 端辨識到落點，請確認或微調";
    });
    c.on("close", () => el("status").textContent = "與 A 的連線中斷");
  });
  peer.on("error", (e) => el("status").textContent = "連線錯誤：" + e.type);
  el("btnConnect").disabled = true;
};

drawTarget();
</script>
</body>
</html>
