<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>貓小隊靶紙辨識 · A 攝影端</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: #0e1116; color: #e7ecf3;
    font-family: -apple-system, "Noto Sans TC", system-ui, sans-serif; }

  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: #0e1116; border-bottom: 1px solid #1d2636;
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  }
  .topbar .back {
    border: 1px solid #2c3744; background: #1b2330; color: #cfd8e4;
    border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
    flex: none;
  }
  .topbar .title { flex: 1; font-size: 13px; color: #6f7b8c; }
  .zoom-row { display: flex; align-items: center; gap: 4px; flex: none; }
  .zoom-row button {
    border: 1px solid #2c3744; background: #1b2330; color: #cfd8e4;
    border-radius: 6px; padding: 4px 10px; font-size: 16px; font-weight: 700;
    cursor: pointer; min-width: 0; line-height: 1;
  }
  .zoom-row span { font-size: 12px; color: #9aa6b6; min-width: 28px; text-align: center; }

  .stage { position: relative; width: 100%; background: #000; overflow: hidden; }
  canvas#view { width: 100%; height: 100%; display: block; touch-action: none; }

  .content { padding: 10px 12px; max-width: 560px; margin-inline: auto; }
  .status { display: flex; align-items: center; gap: 8px; margin: 8px 0;
            font-size: 13px; color: #aab4c2; min-height: 20px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #46506180; flex: none; }
  .dot.on { background: #34d399; box-shadow: 0 0 8px #34d39988; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .room { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  input { background: #161c25; border: 1px solid #2a3340; color: #e7ecf3;
          border-radius: 8px; padding: 10px 12px; font-size: 15px; width: 96px; }
  button { flex: 1 1 auto; min-width: 90px; border: 0; border-radius: 9px;
           padding: 12px 10px; font-size: 14px; font-weight: 600; color: #0e1116;
           background: #5b8cff; cursor: pointer; }
  button.ghost { background: #1b2330; color: #cfd8e4; border: 1px solid #2c3744; }
  button:disabled { opacity: .4; }
  .score { font-size: 13px; color: #9aa6b6; margin-top: 6px; min-height: 18px; }
  .score b { color: #ffd166; font-size: 22px; }
  .auto-row { display: flex; align-items: center; gap: 8px; margin: 8px 0;
              font-size: 13px; color: #aab4c2; }
  .auto-row input[type=checkbox] { width: 18px; height: 18px; accent-color: #5b8cff; cursor: pointer; }
  .hint { font-size: 12px; color: #6f7b8c; line-height: 1.5; margin-top: 10px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back" onclick="window.close()">← 返回</button>
  <span class="title">A 攝影端（手動校準）</span>
  <div class="zoom-row">
    <button id="btnZoomOut">－</button>
    <span id="zoomLabel">1×</span>
    <button id="btnZoomIn">＋</button>
  </div>
</div>

<div class="stage" id="stage">
  <canvas id="view" width="480" height="480"></canvas>
</div>

<div class="content">
  <div class="room">
    <span style="font-size:13px;color:#aab4c2">房號</span>
    <input id="room" value="888" inputmode="numeric" />
    <button id="btnConnect" style="flex:1">連線</button>
  </div>

  <div class="status"><span id="dot" class="dot"></span><span id="msg">尚未連線</span></div>

  <div class="row" style="margin-bottom:8px">
    <button id="btnCalib" class="ghost" disabled>校準四角</button>
    <button id="btnBg" class="ghost" disabled>設定背景</button>
  </div>
  <div class="row">
    <button id="btnArm" disabled>開始偵測</button>
    <button id="btnNext" class="ghost" disabled>下一箭（手動）</button>
  </div>

  <div class="auto-row">
    <input type="checkbox" id="cbAuto" checked />
    <label for="cbAuto">偵測到箭後自動繼續下一箭（3 秒）</label>
  </div>

  <div class="score" id="scoreLine"></div>

  <p class="hint">
    流程：① 連線 → ② 校準四角（依序點 <b>左上→右上→右下→左下</b>）→
    ③ 射手就位、靶面乾淨時按「設定背景」→ ④「開始偵測」→ 放箭。<br />
    需以 https 或 localhost 開啟，瀏覽器才允許開鏡頭。
  </p>
</div>

<video id="cam" autoplay playsinline muted style="display:none"></video>

<script type="module">
import { computeHomography, applyHomography } from "./lib/homography.js";
import { ArrowDetector } from "./lib/detector.js";
import { pickEntryPoint } from "./lib/scoring.js";

const W = 480, VH = 480;
const cam = document.getElementById("cam");
const view = document.getElementById("view");
const ctx = view.getContext("2d", { willReadFrequently: true });
const el = (id) => document.getElementById(id);
const dot = el("dot"), msg = el("msg"), scoreLine = el("scoreLine");

function resizeStage() {
  const w = window.innerWidth;
  const h = Math.min(Math.round(w * 0.85), 480);
  el("stage").style.height = h + "px";
}
resizeStage();
window.addEventListener("resize", resizeStage);

let state = "idle";
let calibrating = false;
let calibPts = [];
let H = null;
const detector = new ArrowDetector();
let conn = null;
let lastDetect = 0;
let autoCountdown = null;
let armGuard = 0;

// ---- 鏡頭縮放 ----
let videoTrack = null;
let currentZoom = 1;
let zoomMin = 1, zoomMax = 5;
let digitalZoom = false;

async function applyZoom(z) {
  currentZoom = Math.max(zoomMin, Math.min(zoomMax, Math.round(z * 2) / 2));
  el("zoomLabel").textContent = currentZoom.toFixed(1) + "×";
  if (videoTrack) {
    const caps = videoTrack.getCapabilities?.() || {};
    if (caps.zoom) {
      try { await videoTrack.applyConstraints({ advanced: [{ zoom: currentZoom }] }); return; }
      catch (_) {}
    }
  }
  digitalZoom = true;
}

el("btnZoomIn").onclick = () => applyZoom(currentZoom + 0.5);
el("btnZoomOut").onclick = () => applyZoom(currentZoom - 0.5);

function setMsg(t, on) { msg.textContent = t; dot.classList.toggle("on", !!on); }

function nextArrow() {
  clearTimeout(autoCountdown);
  autoCountdown = null;
  state = "settle";
  armGuard = performance.now() + 1200;
  scoreLine.textContent = "";
  setMsg("偵測中…放下一箭", true);
  loop();
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false,
    });
    cam.srcObject = stream;
    await cam.play();
    videoTrack = stream.getVideoTracks()[0];
    const caps = videoTrack.getCapabilities?.() || {};
    if (caps.zoom) { zoomMin = caps.zoom.min || 1; zoomMax = caps.zoom.max || 5; }
    loop();
  } catch (e) {
    setMsg("無法開啟鏡頭：" + e.message, false);
  }
}

function connect() {
  const room = el("room").value.trim() || "888";
  const peer = new Peer("catarch-cam-" + room);
  peer.on("open", () => {
    setMsg("已上線，等待 B 端連入…房號 " + room, true);
    state = "ready";
    el("btnCalib").disabled = false;
    el("btnBg").disabled = false;
    startCamera();
  });
  peer.on("connection", (c) => {
    conn = c;
    c.on("open", () => setMsg("B 端已連線 ✓", true));
    c.on("close", () => setMsg("B 端已離線", false));
  });
  peer.on("error", (e) => setMsg("連線錯誤：" + e.type, false));
  el("btnConnect").disabled = true;
}

view.addEventListener("pointerdown", (ev) => {
  if (!calibrating) return;
  const r = view.getBoundingClientRect();
  const x = (ev.clientX - r.left) * (W / r.width);
  const y = (ev.clientY - r.top) * (VH / r.height);
  calibPts.push({ x, y });
  if (calibPts.length === 4) {
    H = computeHomography(calibPts, [
      { x: 0, y: 0 }, { x: 1, y: 0 }, { x: 1, y: 1 }, { x: 0, y: 1 },
    ]);
    calibrating = false;
    el("btnCalib").textContent = "重新校準";
    if (H) {
      detector.setROI(calibPts); // 校準後限定偵測 ROI = 靶面矩形
      setMsg("校準完成（ROI 已設定），請設定背景", true);
    } else {
      setMsg("校準失敗（四點別共線），請重試", false);
      calibPts = [];
    }
  }
});

el("btnCalib").onclick = () => {
  calibrating = true; calibPts = []; H = null;
  detector.clearROI();
  setMsg("校準中：依序點 左上→右上→右下→左下", false);
};

el("btnBg").onclick = () => {
  detector.setReference(ctx.getImageData(0, 0, W, VH));
  setMsg("背景已記錄，可開始偵測", true);
  el("btnArm").disabled = false;
};

el("btnArm").onclick = () => {
  if (!H) { setMsg("請先校準四角", false); return; }
  if (!detector.hasReference()) { setMsg("請先設定背景", false); return; }
  state = "armed";
  armGuard = performance.now() + 800;
  el("btnArm").disabled = true;
  el("btnNext").disabled = false;
  setMsg("偵測中…放箭", true);
};

el("btnNext").onclick = nextArrow;
el("btnConnect").onclick = connect;

function loop() {
  if (state === "result") return;

  if (digitalZoom && currentZoom > 1) {
    const sw = W / currentZoom, sh = VH / currentZoom;
    const sx = (W - sw) / 2, sy = (VH - sh) / 2;
    ctx.drawImage(cam, sx, sy, sw, sh, 0, 0, W, VH);
  } else {
    ctx.drawImage(cam, 0, 0, W, VH);
  }

  if (state === "settle") {
    detector.setReference(ctx.getImageData(0, 0, W, VH));
    state = "armed";
  }

  if (calibPts.length) {
    ctx.fillStyle = "#34d399";
    calibPts.forEach((p, i) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 7); ctx.fill();
      ctx.fillStyle = "#0e1116"; ctx.font = "11px sans-serif";
      ctx.fillText(i + 1, p.x - 3, p.y + 4); ctx.fillStyle = "#34d399";
    });
    if (calibPts.length === 4) {
      ctx.strokeStyle = "#34d399aa"; ctx.lineWidth = 2; ctx.beginPath();
      calibPts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      ctx.closePath(); ctx.stroke();
    }
  }

  if (state === "armed" && performance.now() - lastDetect > 150 && performance.now() > armGuard) {
    lastDetect = performance.now();
    const res = detector.detect(ctx.getImageData(0, 0, W, VH));
    if (res) {
      handleHit(res);
    } else {
      const d = detector.getDebug();
      if (d) scoreLine.textContent = `偵測中… 變動像素 ${d.count}（${d.frac}）比例 ${d.ratio ?? "-"} → ${d.reason}`;
    }
  }

  requestAnimationFrame(loop);
}

// 顏色判斷評分（靶放大情況下，每圈約 10-15px 寬，採樣半徑要小）
// 一次 getImageData 取整塊，smp() 從陣列索引（避免手機逐像素讀 GPU）
function scoreAtPoint(px, py) {
  const FETCH_R = 25;
  const x0 = Math.max(0, Math.round(px) - FETCH_R);
  const y0 = Math.max(0, Math.round(py) - FETCH_R);
  const x1 = Math.min(W - 1, Math.round(px) + FETCH_R);
  const y1 = Math.min(VH - 1, Math.round(py) + FETCH_R);
  const iw = x1 - x0 + 1, ih = y1 - y0 + 1;
  const pix = ctx.getImageData(x0, y0, iw, ih).data;

  function smp(x, y) {
    const xi = Math.round(x) - x0, yi = Math.round(y) - y0;
    if (xi < 0 || xi >= iw || yi < 0 || yi >= ih) return {r:0,g:0,b:0};
    const p = (yi * iw + xi) * 4;
    return {r: pix[p], g: pix[p+1], b: pix[p+2]};
  }

  const isY = c => c.r>130 && c.g>100 && c.b<130 && c.r+c.g>c.b*3;
  const isR = c => c.r>110 && c.g<110 && c.b<110 && c.r>c.g*1.2;
  const isB = c => c.b>100 && c.b>c.r+20 && c.b>c.g*0.7;

  // 半徑 7px 圓內採樣，排除箭矢深色（靶放大後約 1/2 圈寬，不跨環）
  let sr=0, sg=0, sb=0, n=0;
  for (let dy=-7; dy<=7; dy++) for (let dx=-7; dx<=7; dx++) {
    if (dx*dx+dy*dy > 49) continue;
    const c = smp(px+dx, py+dy);
    if (c.r+c.g+c.b > 90) { sr+=c.r; sg+=c.g; sb+=c.b; n++; }
  }
  if (n < 3) return {score:0, ring:"M", _dbg:"dark"};

  const ctr = {r: sr/n|0, g: sg/n|0, b: sb/n|0};
  const neighbors = r => {
    const a=[];
    for (let i=0; i<8; i++) { const t=i*Math.PI/4; a.push(smp(px+Math.cos(t)*r, py+Math.sin(t)*r)); }
    return a;
  };

  // 鄰居距離配合放大後環寬（黃圈寬 ≈10px → 鄰居 12px 可抵達紅圈）
  if (isY(ctr)) return neighbors(12).some(isR) ? {score:9,ring:"9",_dbg:`Y r${ctr.r}g${ctr.g}b${ctr.b}`} : {score:10,ring:"X",_dbg:`Y r${ctr.r}g${ctr.g}b${ctr.b}`};
  if (isR(ctr)) return neighbors(10).some(isY) ? {score:8,ring:"8",_dbg:`R r${ctr.r}g${ctr.g}b${ctr.b}`} : {score:7,ring:"7",_dbg:`R r${ctr.r}g${ctr.g}b${ctr.b}`};
  if (isB(ctr)) return {score:6, ring:"6", _dbg:`B r${ctr.r}g${ctr.g}b${ctr.b}`};
  return {score:0, ring:"M", _dbg:`? r${ctr.r}g${ctr.g}b${ctr.b}`};
}

function handleHit(res) {
  const [a, b] = res.ends;
  const na = applyHomography(H, a.x, a.y);
  const nb = applyHomography(H, b.x, b.y);
  const entryNorm = pickEntryPoint(na, nb);
  const entryPx = (entryNorm === na) ? a : b;

  // 先採顏色計分（用靠近中心的端點，12px 半徑繞過箭矢本體）
  const sc = scoreAtPoint(entryPx.x, entryPx.y);

  ctx.strokeStyle = "#5b8cff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  ctx.fillStyle = "#5b8cff88";
  [a, b].forEach((p) => { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill(); });
  ctx.fillStyle = "#ffd166";
  ctx.beginPath(); ctx.arc(entryPx.x, entryPx.y, 8, 0, 7); ctx.fill();

  state = "result";
  if (conn && conn.open)
    conn.send({ nx: entryNorm.x, ny: entryNorm.y, score: sc.score, ring: sc.ring, ts: Date.now() });

  const autoMode = el("cbAuto").checked;
  if (autoMode) {
    let cd = 3;
    function tick() {
      if (cd > 0) {
        scoreLine.innerHTML = `辨識：<b>${sc.ring === "M" ? "脫靶" : sc.score}</b> 分 <span style="color:#6f7b8c;font-size:11px">— ${cd}s後繼續 [${sc._dbg||""}]</span>`;
        cd--;
        autoCountdown = setTimeout(tick, 1000);
      } else {
        if (conn && conn.open) conn.send({ type: "auto_next" }); // 通知 B 端自動確認
        nextArrow();
      }
    }
    setMsg("✅ 已辨識，3s 後自動繼續（或按「下一箭」跳過）", true);
    tick();
  } else {
    scoreLine.innerHTML = `辨識：<b>${sc.ring === "M" ? "脫靶" : sc.score}</b> 分 <span style="color:#6f7b8c;font-size:11px">[${sc._dbg||""}]</span>`;
    setMsg("已辨識，按「下一箭（手動）」繼續", true);
  }
}
</script>
</body>
</html>
